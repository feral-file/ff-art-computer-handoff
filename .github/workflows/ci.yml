name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: test -z "$(gofmt -l .)"
        working-directory: server
      - run: go vet ./...
        working-directory: server
      - run: go test ./...
        working-directory: server
      - run: go build ./...
        working-directory: server

  session-recipient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/session-recipient/js/package-lock.json
      - run: npm ci
        working-directory: clients/session-recipient/js
      - run: npm run lint
        working-directory: clients/session-recipient/js
      - run: npm run typecheck
        working-directory: clients/session-recipient/js
      - run: npm test
        working-directory: clients/session-recipient/js

  ephemeral-token-minter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: clients/ephemeral-token-minter/go/go.mod
          cache-dependency-path: clients/ephemeral-token-minter/go/go.mod
      - run: test -z "$(gofmt -l .)"
        working-directory: clients/ephemeral-token-minter/go
      - run: go vet ./...
        working-directory: clients/ephemeral-token-minter/go
      - run: go test ./...
        working-directory: clients/ephemeral-token-minter/go

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: clients/session-recipient/js
      - run: npm ci
        working-directory: integration
      - run: npm run sample:build
        working-directory: integration
      - run: npm run lint
        working-directory: integration
      - run: npm run typecheck
        working-directory: integration
      - run: npm test
        working-directory: integration

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mint-pairing-broker:ci
