<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FF1 DP1 Mint Pairing Sample</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-zinc-950 text-zinc-100 antialiased">
    <main class="grid min-h-screen grid-cols-[minmax(0,1fr)_360px] max-lg:grid-cols-1">
      <form id="play-form" class="flex min-h-screen flex-col gap-5 border-r border-zinc-800 p-5 max-lg:border-r-0">
        <div class="flex flex-wrap items-end justify-between gap-4">
          <div>
            <p class="text-xs font-semibold uppercase tracking-normal text-red-400">NFT display website sample</p>
            <h1 class="mt-2 text-3xl font-semibold tracking-normal text-zinc-50">FF1 DP1 mint pairing</h1>
          </div>
          <button
            id="play-button"
            type="submit"
            class="h-11 rounded-md bg-red-500 px-5 text-sm font-bold text-white transition hover:bg-red-400 disabled:cursor-wait disabled:bg-zinc-700 disabled:text-zinc-400"
          >
            Play on FF1
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4 max-md:grid-cols-1">
          <label class="block">
            <span class="mb-2 block text-sm font-semibold text-zinc-300">Broker URL</span>
            <input
              id="broker-url"
              class="h-11 w-full rounded-md border border-zinc-800 bg-zinc-900 px-3 font-mono text-sm text-zinc-100 outline-none transition focus:border-red-400 focus:ring-2 focus:ring-red-500/20"
              value="http://127.0.0.1:8080"
              autocomplete="off"
            />
          </label>
          <label class="block">
            <span class="mb-2 block text-sm font-semibold text-zinc-300">Relayer URL</span>
            <input
              id="relayer-url"
              class="h-11 w-full rounded-md border border-zinc-800 bg-zinc-900 px-3 font-mono text-sm text-zinc-100 outline-none transition focus:border-red-400 focus:ring-2 focus:ring-red-500/20"
              value="https://artwork-info.feral-file.workers.dev"
              autocomplete="off"
            />
          </label>
        </div>

        <label class="block">
          <span class="mb-2 block text-sm font-semibold text-zinc-300">DP1 feed URL</span>
          <input
            id="feed-url"
            class="h-11 w-full rounded-md border border-zinc-800 bg-zinc-900 px-3 font-mono text-sm text-zinc-100 outline-none transition focus:border-red-400 focus:ring-2 focus:ring-red-500/20"
            placeholder="https://nft.example/dp1/feed.json"
            autocomplete="off"
            required
          />
        </label>

        <div class="grid flex-1 grid-cols-2 gap-4 max-md:grid-cols-1">
          <label class="flex min-h-[360px] flex-col">
            <span class="mb-2 block text-sm font-semibold text-zinc-300">Pairing QR payload JSON</span>
            <textarea
              id="qr-payload"
              class="min-h-[320px] flex-1 resize-none rounded-md border border-zinc-800 bg-zinc-900 p-4 font-mono text-sm leading-6 text-zinc-100 outline-none transition placeholder:text-zinc-600 focus:border-red-400 focus:ring-2 focus:ring-red-500/20"
              spellcheck="false"
              autocomplete="off"
              placeholder='{"v":1,"type":"ff-mint-pairing","brokerBaseUrl":"...","channelId":"ch_...","pairingToken":"pt_..."}'
            ></textarea>
          </label>
          <label class="flex min-h-[360px] flex-col">
            <span class="mb-2 block text-sm font-semibold text-zinc-300">Short code</span>
            <input
              id="short-code"
              class="h-11 rounded-md border border-zinc-800 bg-zinc-900 px-3 font-mono text-lg text-zinc-100 outline-none transition focus:border-red-400 focus:ring-2 focus:ring-red-500/20"
              placeholder="123456"
              inputmode="numeric"
              autocomplete="off"
            />
            <div class="mt-4 flex-1 rounded-md border border-zinc-800 bg-zinc-900 p-4">
              <span class="block text-xs font-semibold uppercase tracking-normal text-zinc-500">Session</span>
              <strong id="session-status" class="mt-2 block text-lg text-zinc-50">Checking</strong>
              <button
                id="forget-session"
                type="button"
                class="mt-5 h-10 rounded-md border border-zinc-700 px-4 text-sm font-semibold text-zinc-200 transition hover:border-zinc-500 hover:bg-zinc-800"
              >
                Forget
              </button>
            </div>
          </label>
        </div>
      </form>

      <aside class="flex min-h-screen flex-col justify-between bg-zinc-900 p-5 max-lg:min-h-0" aria-live="polite">
        <div>
          <span class="block text-xs font-semibold uppercase tracking-normal text-zinc-500">Status</span>
          <p id="message" class="mt-2 text-sm font-medium leading-6 text-zinc-300"></p>
        </div>
      </aside>
    </main>

    <script type="module">
      import {
        readStoredEphemeralBrowserSession,
        requestEphemeralSession
      } from "@feral-file/mint-pairing-requester-js";

      const form = mustElement("play-form");
      const brokerUrlInput = mustElement("broker-url");
      const relayerUrlInput = mustElement("relayer-url");
      const feedUrlInput = mustElement("feed-url");
      const qrPayloadInput = mustElement("qr-payload");
      const shortCodeInput = mustElement("short-code");
      const playButton = mustElement("play-button");
      const forgetButton = mustElement("forget-session");
      const sessionStatus = mustElement("session-status");
      const message = mustElement("message");

      function mustElement(id) {
        const element = document.getElementById(id);
        if (element === null) {
          throw new Error(`missing element: ${id}`);
        }
        return element;
      }

      function setBusy(isBusy) {
        playButton.disabled = isBusy;
        feedUrlInput.disabled = isBusy;
        qrPayloadInput.disabled = isBusy;
        shortCodeInput.disabled = isBusy;
      }

      function setMessage(value) {
        message.textContent = value;
      }

      function storageKey() {
        return `ff:ephemeral-browser-session:${window.location.origin}`;
      }

      function clearStoredSession() {
        localStorage.removeItem(storageKey());
        sessionStatus.textContent = "Not paired";
      }

      function currentSession() {
        const session = readStoredEphemeralBrowserSession(localStorage, window.location.origin);
        sessionStatus.textContent = session === undefined ? "Not paired" : "Paired";
        return session;
      }

      function pairingInput() {
        const qrPayload = qrPayloadInput.value.trim();
        if (qrPayload.length > 0) {
          return { qrPayload: JSON.parse(qrPayload) };
        }
        const shortCode = shortCodeInput.value.trim();
        if (shortCode.length === 0) {
          throw new Error("pairing material required");
        }
        return { brokerBaseUrl: brokerUrlInput.value.trim(), shortCode };
      }

      async function pairSession() {
        sessionStatus.textContent = "Pairing";
        setMessage("Waiting for encrypted approval result.");
        const session = await requestEphemeralSession({
          pairing: pairingInput(),
          origin: window.location.origin,
          browserInfo: {
            name: navigator.userAgent.includes("Chrome") ? "Chrome" : "Browser",
            userAgent: navigator.userAgent,
            label: document.title
          },
          pollIntervalMs: 2000,
          maxWaitMs: 300000
        });
        sessionStatus.textContent = "Paired";
        return session;
      }

      async function playDp1Feed(session) {
        const feedUrl = new URL(feedUrlInput.value.trim()).toString();
        const relayerBaseUrl = session.relayerBaseUrl ?? relayerUrlInput.value.trim();
        const castUrl = new URL("/api/cast", relayerBaseUrl);
        const response = await fetch(castUrl, {
          method: "POST",
          headers: {
            authorization: `Bearer ${session.token}`,
            "content-type": "application/json"
          },
          body: JSON.stringify({ feedUrl })
        });
        if (response.status === 401 || response.status === 403) {
          clearStoredSession();
          throw new Error("browser session rejected");
        }
        if (!response.ok) {
          throw new Error(`display request failed: ${response.status}`);
        }
      }

      forgetButton.addEventListener("click", () => {
        clearStoredSession();
        setMessage("Stored session cleared.");
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        void (async () => {
          setBusy(true);
          try {
            const session = currentSession() ?? await pairSession();
            setMessage("Sending DP1 feed URL to FF1.");
            await playDp1Feed(session);
            setMessage("DP1 feed URL sent.");
          } catch (error) {
            setMessage(error instanceof Error ? error.message : "request failed");
            sessionStatus.textContent = currentSession() === undefined ? "Not paired" : "Paired";
          } finally {
            setBusy(false);
          }
        })();
      });

      currentSession();
      setMessage("Ready.");
    </script>
  </body>
</html>
